global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'gnosis-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
    scrape_interval: 10s

  - job_name: 'gnosis-health'
    metrics_path: '/api/v1/health'
    static_configs:
      - targets: ['backend:8000']
    scrape_interval: 30s
