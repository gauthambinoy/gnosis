[tool.mypy]
# Phase 5 scope: mypy is enabled for the 75 clean modules in app/core.
# The files below are excluded because they need deeper fixes (SQLAlchemy Column
# type inference, broad dict[str,object] patterns, etc.) — tracked for Phase 6.
# To expand coverage, remove a module from the exclude/overrides list and fix its errors.
python_version = "3.12"
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true
check_untyped_defs = true
strict_equality = true
# not yet: disallow_untyped_defs (start scoped, expand later)

# Prevent mypy from directly scanning these problematic modules.
# Also combined with ignore_errors overrides below so they don't surface errors
# when imported by clean modules (mypy follows imports transitively).
exclude = """(?x)
  app/(
    core/(
      activity_feed|agent_factory|audit_log|auth|auto_api|aws_services
      |billing|bundle_analyzer|changelog|collaboration|command_registry
      |config_snapshots|database|db_pool|dlq|dream_engine|embeddings
      |emotion_engine|engine_state_store|env_validator|error_handlers
      |execution_recorder|feature_flags|file_manager|flamegraph|gdpr_engine
      |help_system|knowledge_graph|llm_gateway|marketplace|oracle_engine
      |pagination|persona_inheritance|pii_detector|pii_scrubber|pipeline
      |pool_monitor|predictive_engine|progressive_reasoning|prompt_optimizer
      |query_analyzer|queue|rag_engine|rate_limiter|recipes|redis_batcher
      |redis_client|retention_engine|retry_engine|retry|rpa_engine|scheduler
      |sentry_integration|session_store|shutdown|skill_badges|swarm_engine
      |system_control|time_travel|tool_registry|trust_engine|tutorials
      |vector_store|webhook_dispatcher|webhooks|webhook_triggers
    )
    |llm/.*
    |ws/.*
    |api/.*
    |models/.*
  )\\.py$
"""

[[tool.mypy.overrides]]
module = ["sqlalchemy.*", "boto3.*"]
ignore_missing_imports = true

# Phase 5 deferred modules — silence errors when imported by clean app/core modules.
# Each module here has unresolved type issues deferred to a future phase.
[[tool.mypy.overrides]]
module = [
  "app.core.activity_feed",
