version: 2

updates:
  # Python backend — grouped to reduce PR noise
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      python-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    labels:
      - dependencies

  # JavaScript frontend — grouped to reduce PR noise
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      npm-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    labels:
      - dependencies

  # GitHub Actions — grouped
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns: ["*"]
    labels:
      - dependencies
