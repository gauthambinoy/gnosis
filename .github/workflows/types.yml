name: Type Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mypy-backend:
    name: mypy (backend/app/core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Run mypy
        # Checks only the 75 clean modules in app/core (Phase 5 scope).
        # Remaining modules are excluded via pyproject.toml [tool.mypy] exclude list
        # and will be enabled incrementally in subsequent phases.
        run: |
          cd backend
          mypy app/core

  tsc-frontend:
    name: tsc --noEmit (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run TypeScript type-check
        run: cd frontend && npm run typecheck
