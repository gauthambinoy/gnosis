name: "◎ Gnosis CI"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CI_SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gnosis_ci
          POSTGRES_USER: gnosis
          POSTGRES_PASSWORD: gnosis_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gnosis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Lint (compile check)
        run: cd backend && python -m py_compile app/main.py

      - name: Lint (ruff)
        run: cd backend && ruff check .

      - name: Test (with coverage)
        run: |
          cd backend
          pytest tests/ -v --tb=short \
            --cov=app --cov-report=term-missing \
            --cov-fail-under=40
        env:
          DEBUG: "true"
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"

      - name: Alembic up/down smoke (PostgreSQL)
        run: |
          cd backend
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
        env:
          DEBUG: "true"
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          DATABASE_URL: "postgresql+asyncpg://gnosis:gnosis_ci@localhost:5432/gnosis_ci"

      - name: Import check
        run: |
          cd backend
          python -c "from app.main import app; print(f'Routes loaded: {len(app.routes)}')"
        env:
          DEBUG: "true"
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: cd frontend && npm ci

      - name: Typecheck
        run: cd frontend && npm run typecheck

      - name: Lint
        run: cd frontend && npm run lint

      - name: Test
        run: cd frontend && npx vitest run

      - name: Build
        run: cd frontend && npm run build
