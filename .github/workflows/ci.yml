name: "\u25CE Gnosis CI"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lint (compile check)
        run: |
          cd backend
          python -m py_compile app/main.py

      - name: Lint (ruff)
        run: |
          cd backend
          pip install -q ruff
          ruff check .

      - name: Test
        run: cd backend && pytest tests/ -v --tb=short
        env:
          DEBUG: "true"
          SECRET_KEY: "ci-test-secret-key-not-for-production-use-only-do-not-reuse-anywhere"
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"

      - name: Import check
        run: |
          cd backend
          python -c "from app.main import app; print(f'Routes: {len(app.routes)}')"
        env:
          DEBUG: "true"
          SECRET_KEY: "ci-test-secret-key-not-for-production-use-only-do-not-reuse-anywhere"
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

      - name: Lint
        run: cd frontend && npm run lint

      - name: Test
        run: cd frontend && npx vitest run
