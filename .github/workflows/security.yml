name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Gitleaks – secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bandit:
    name: Bandit – Python SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit
        run: bandit -r backend/app -ll -ii -x backend/tests

  pip-audit:
    name: pip-audit – Python dependency CVEs
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        run: pip-audit -r backend/requirements.txt --strict

  npm-audit:
    name: npm audit – JS dependency CVEs
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

  trivy-fs:
    name: Trivy – filesystem scan (CRITICAL+HIGH)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Fail on CRITICAL vulnerabilities
      - name: Trivy scan – CRITICAL (fail)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: "."
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      # Surface HIGH vulnerabilities as advisory (no fail)
      - name: Trivy scan – HIGH (advisory)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: "."
          severity: HIGH
          ignore-unfixed: true
          exit-code: "0"
          format: table
