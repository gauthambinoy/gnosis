name: Terraform Validate

on:
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: fmt + validate + tflint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.9
          terraform_wrapper: false

      - name: terraform fmt -check -recursive
        run: terraform fmt -check -recursive -diff

      - name: terraform init -backend=false
        run: terraform init -backend=false -input=false

      - name: terraform validate
        run: terraform validate -no-color

      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: tflint --recursive
        run: tflint --recursive --disable-rule=terraform_required_providers --disable-rule=terraform_required_version

  tfsec:
    name: tfsec security scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1
        with:
          working_directory: infra/terraform
          soft_fail: false
